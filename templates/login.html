<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>登录 - Expert AI Studio</title>
	<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
	<div class="auth-card">
		<div class="card-header">
			<h1><span class="material-symbols-outlined">login</span>登录</h1>
		</div>
		<p class="subtext">请输入手机号和密码开始使用</p>

		{% if error %}
		<div class="form-error">{{ error }}</div>
		{% endif %}

		<form class="auth-form" method="post" action="{{ url_for('auth.login') }}">
			<div class="form-group">
				<label for="user_id">手机号</label>
				<input id="user_id" name="user_id" type="text" placeholder="请输入手机号" required autocomplete="username" maxlength="11" pattern="1\d{10}" title="请输入 11 位手机号">
				<div id="user-id-error" class="form-error inline" style="display:none; margin-top:6px;"></div>
			</div>

			<div class="form-group">
				<label for="password">密码</label>
				<input id="password" name="password" type="password" placeholder="请输入密码" required autocomplete="current-password" maxlength="128">
				<div id="password-error" class="form-error inline" style="display:none; margin-top:6px;"></div>
			</div>

			<div class="auth-actions">
				<button type="submit" class="primary-btn">登录</button>
				<div class="form-footer">还没有账号？<a class="text-link" href="{{ url_for('auth.registration2') }}">去注册</a></div>
			</div>
		</form>
	</div>

	<script>
	(function() {
		const form = document.querySelector('.auth-form');
			const studentId = null;
			const userId = document.getElementById('user_id');
		const password = document.getElementById('password');
			const userIdError = document.getElementById('user-id-error');
			const passwordError = document.getElementById('password-error');
			const phoneRe = /^1\d{10}$/;
		const passwordRe = /^\S{1,128}$/;

		function showError(el, message) {
			el.textContent = message;
			el.style.display = 'block';
		}

		function clearError(el) {
			el.textContent = '';
			el.style.display = 'none';
		}

		function validate() {
			let ok = true;
				clearError(userIdError);
			clearError(passwordError);


			if (!userId.value.trim()) {
				showError(userIdError, '请输入手机号');
				ok = false;
			} else if (!phoneRe.test(userId.value.trim())) {
				showError(userIdError, '手机号格式不正确，请输入 11 位手机号');
				ok = false;
			}

			if (!password.value) {
				showError(passwordError, '请输入密码');
				ok = false;
			} else if (!passwordRe.test(password.value)) {
				showError(passwordError, '密码格式不正确，请不要包含空白字符，最长 128 字符');
				ok = false;
			}

			return ok;
		}

		form.addEventListener('submit', function(e) {
			if (!validate()) {
				e.preventDefault();
			}
		});

			userId.addEventListener('input', function() { clearError(userIdError); });
		password.addEventListener('input', function() { clearError(passwordError); });
	})();
	</script>
</body>
</html>
